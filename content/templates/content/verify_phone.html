{% extends "content/base.html" %}
{% block content %}
<section class="page-header text-center narrow-shell center-shell">
  <div class="page-eyebrow center-shell">Verification</div>
  <h1>{{ ui.verify_title }}</h1>
</section>

{% if error %}
  <div class="card alert-error centered-card">{{ error }}</div>
{% else %}
  <p class="page-subtitle center-shell text-center">{{ ui.verify_subtitle }}</p>
{% endif %}

<form method="post" class="card form-card centered-card">
  {% csrf_token %}
  <label>{{ ui.verify_label }}</label>
  <input type="tel" name="parent_phone" required placeholder="{{ ui.verify_placeholder }}" />
  <div class="form-actions">
    <button class="btn btn-green" type="submit">{{ ui.verify_button }}</button>
  </div>
</form>

<p class="muted text-center">
  {{ ui.verify_terms_prefix }}
  <a href="{% url 'content:terms_public' %}" target="_blank" rel="noopener">{{ ui.verify_terms_link }}</a>.
</p>
{% endblock %}
