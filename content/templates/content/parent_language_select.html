{% extends "content/base.html" %}
{% block content %}
<section class="page-header text-center narrow-shell center-shell">
  <div class="page-eyebrow center-shell">Language Selection</div>
  <h1>Please Select Language</h1>
  <p class="page-subtitle center-shell">Choose the language most comfortable for the parent or caregiver before continuing.</p>
</section>
<div class="card">
  <div class="btn-grid">
    {% for l in languages %}
      <a class="btn btn-sm" href="{% url 'content:screening_form' pro.unique_doctor_code l.lang_code %}">
        {{ l.lang_name_english }}
      </a>
    {% endfor %}
  </div>
</div>

{% endblock %}
