{% extends "content/base.html" %}
{% block content %}
<section class="page-header text-center narrow-shell center-shell">
  <div class="page-eyebrow center-shell">Self Screening</div>
  <h1>Start Screening (Self)</h1>
  <p class="page-subtitle center-shell">Enter your WhatsApp number to begin a self-guided screening flow without a clinic code.</p>
</section>

{% if error %}
  <div class="card alert-error centered-card">
      {{ error }}
  </div>
{% endif %}

<div class="center-shell narrow-shell">
  <form method="post" class="card form-card centered-card">
    {% csrf_token %}

    <p class="muted">
      Enter your WhatsApp number to begin.
    </p>

    <label>Enter Parent's WhatsApp No.</label>
    <input type="tel" name="parent_phone" required placeholder="10-digit WhatsApp number" />

    <div class="form-actions">
      <button class="btn btn-green" type="submit">Continue</button>
    </div>
  </form>
</div>

{% endblock %}
