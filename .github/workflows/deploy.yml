name: Deploy EmoScreen Main to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: emoscreen-main-deploy
  cancel-in-progress: false

jobs:
  deploy-main:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Main via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /var/www/EmoScreen

            git fetch origin main

            git checkout main

            git pull --ff-only origin main

            DEPLOY_ENV=production \
            DEPLOY_BRANCH=main \
            DJANGO_DEBUG=false \
            ALLOWED_HOSTS=127.0.0.1,localhost,emo.stage.cpdinclinic.co.in \
            CSRF_TRUSTED_ORIGINS=https://emo.stage.cpdinclinic.co.in \
            FORCE_HTTPS=true \
            bash scripts/deploy.sh
