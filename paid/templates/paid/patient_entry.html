{% extends "content/base.html" %}
{% block content %}
<section class="page-header text-center narrow-shell center-shell">
  <div class="page-eyebrow center-shell">Order Intake</div>
  <h1>EmoScreen Order</h1>
</section>
<div class="card">
  <p><strong>Form:</strong> {{ order.form.title }}</p>
  <p><strong>Amount:</strong> ₹{{ final_amount_rupees|floatformat:2 }}</p>
  {% if email_required_notice %}
    <p class="alert alert-info">{{ email_required_notice }}</p>
  {% endif %}
  <form method="post" class="stack-sm">
    {% csrf_token %}
    {{ email_form.as_p }}
    <div class="form-actions">
      <button class="btn" type="submit">Continue</button>
    </div>
  </form>
</div>
{% endblock %}
